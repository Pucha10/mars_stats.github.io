<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remik - Historia Gier</title>
    <link rel="stylesheet" href="css/remik-style.css">

</head>
<body>
    <div class="container">
        <header class="main-header">
            <div class="logo-area">
                <h1>🎴 Remik Stats</h1>
            </div>
            <div class="actions">
                <button id="new-remik-game-btn" class="btn-primary">
                    <span class="icon">+</span> Nowa Gra
                </button>
                <a href="index.html" class="btn-secondary">Mars Stats</a>
            </div>
        </header>

        <div class="remik-dashboard">
            <div class="stat-box">
                <span class="label">Rozegrane gry</span>
                <span id="total-games" class="value">0</span>
            </div>
        </div>

        <div class="table-container">
            <table id="remik-main-table">
                <thead>
                    <tr>
                        <th>LP</th>
                        <th>Gracze</th>
                        <th>Zwycięzca</th>
                        <th>Status</th>
                        <th>Akcje</th>
                    </tr>
                </thead>
                <tbody id="remik-tbody">
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/supaBaseScript.js"></script>
    <script src="js/remik-main.js"></script>
</body>
</html>
